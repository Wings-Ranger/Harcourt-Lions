<body>
  <nav>

  <li><img src="images/lions-logo.jpg" alt="Lions Logo" width="55" height="50"></li>

  <ul>
  <li><img src="images/lions-logo.jpg" alt="Lions Logo" width="55" height="50"></li>

  <li class="hideonmobile"><a href="membership.html">Membership</a></li>

  <div class="backdrop" onclick="hideSidebar()" aria-hidden="true"></div>
  <section class="billboard">
  <img class="lionsbill" src="images/lions-billboard.jpg" alt="Lionsclub.org" title="Lions Club"/>
  </section>
  <script>
  function showSidebar(){
    document.body.classList.add("sidebar-open");
  }
  function hideSidebar(){
    document.body.classList.remove("sidebar-open");
  }
  // Accessibility: close sidebar with Escape and Backspace keys
    document.addEventListener('keydown', function(event) {
      if (event.key === "Escape" || event.key === "Backspace") {
        hideSidebar();
      }
    });
        // Accessibility: open sidebar with Enter key
        document.addEventListener('keydown', function(event) {
      if (event.key === "Enter") {
        showSidebar();
      }
    });
  </script>
</body>
